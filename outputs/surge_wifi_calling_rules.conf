[Proxy Group]
WiFiCalling-Global = select, US-Node, JP-Node, HK-Node, SG-Node, TW-Node, DIRECT
WiFiCalling-US = select, US-Node, HK-Node, SG-Node, DIRECT
WiFiCalling-JP = select, JP-Node, HK-Node, SG-Node, DIRECT
WiFiCalling-HK = select, HK-Node, SG-Node, DIRECT
WiFiCalling-SG = select, SG-Node, HK-Node, DIRECT
WiFiCalling-TW = select, TW-Node, HK-Node, SG-Node, DIRECT
WiFiCalling-EU = select, DE-Node, NL-Node, FR-Node, UK-Node, DIRECT

[Rule]
# Apple / 系统相关基础流量，优先直连，避免影响 IMS / 认证 / 设备注册
PROCESS-NAME,trustd,DIRECT
DOMAIN,api.smoot.apple.com,DIRECT
DOMAIN,gs-loc.apple.com,DIRECT
DOMAIN,captive.apple.com,DIRECT
DOMAIN,configuration.apple.com,DIRECT
DOMAIN-SUFFIX,ess.apple.com,DIRECT
DOMAIN-SUFFIX,push-apple.com.akadns.net,DIRECT
DOMAIN-SUFFIX,push.apple.com,DIRECT
DOMAIN-SUFFIX,lcdn-locator.apple.com,DIRECT
DOMAIN-SUFFIX,lcdn-registration.apple.com,DIRECT
DOMAIN-SUFFIX,ls.apple.com,DIRECT

# Wi-Fi Calling / IMS 域名规则集：运营商域名待确认后补充
# 使用 RULE-SET 便于按国家/运营商扩展，实际域名可拆成多个独立规则集
RULE-SET,WiFiCalling-US,WiFiCalling-US
RULE-SET,WiFiCalling-JP,WiFiCalling-JP
RULE-SET,WiFiCalling-HK,WiFiCalling-HK
RULE-SET,WiFiCalling-SG,WiFiCalling-SG
RULE-SET,WiFiCalling-TW,WiFiCalling-TW
RULE-SET,WiFiCalling-EU,WiFiCalling-EU

# 按目标服务器地理位置分流到不同节点组
GEOIP,US,WiFiCalling-US
GEOIP,JP,WiFiCalling-JP
GEOIP,HK,WiFiCalling-HK
GEOIP,SG,WiFiCalling-SG
GEOIP,TW,WiFiCalling-TW
GEOIP,DE,WiFiCalling-EU
GEOIP,NL,WiFiCalling-EU
GEOIP,FR,WiFiCalling-EU
GEOIP,GB,WiFiCalling-EU

# 未命中时，走可选总组
FINAL,WiFiCalling-Global

