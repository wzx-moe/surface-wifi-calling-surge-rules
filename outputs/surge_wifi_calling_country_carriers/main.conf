# Standalone Surge 5 full config for Wi-Fi Calling
# If you merge this into an existing config, copy the [Proxy Group] and [Rule] blocks only and keep them above broad rules.

[General]
loglevel = notify
include-all-networks = true
include-cellular-services = true

[Proxy Group]
WiFiCalling-Global 🌐 = select, include-all-proxies=true
WiFiCalling-US 🇺🇸 = select, include-all-proxies=true
WiFiCalling-CA 🇨🇦 = select, include-all-proxies=true
WiFiCalling-MX 🇲🇽 = select, include-all-proxies=true
WiFiCalling-BR 🇧🇷 = select, include-all-proxies=true
WiFiCalling-JP 🇯🇵 = select, include-all-proxies=true
WiFiCalling-KR 🇰🇷 = select, include-all-proxies=true
WiFiCalling-HK 🇭🇰 = select, include-all-proxies=true
WiFiCalling-TW 🇹🇼 = select, include-all-proxies=true
WiFiCalling-SG 🇸🇬 = select, include-all-proxies=true
WiFiCalling-IN 🇮🇳 = select, include-all-proxies=true
WiFiCalling-AU 🇦🇺 = select, include-all-proxies=true
WiFiCalling-NZ 🇳🇿 = select, include-all-proxies=true
WiFiCalling-UA 🇺🇦 = select, include-all-proxies=true
WiFiCalling-GB 🇬🇧 = select, include-all-proxies=true
WiFiCalling-DE 🇩🇪 = select, include-all-proxies=true
WiFiCalling-FR 🇫🇷 = select, include-all-proxies=true
WiFiCalling-IT 🇮🇹 = select, include-all-proxies=true
WiFiCalling-ES 🇪🇸 = select, include-all-proxies=true
WiFiCalling-NL 🇳🇱 = select, include-all-proxies=true

[Rule]
RULE-SET,SYSTEM,DIRECT
RULE-SET,LAN,DIRECT

RULE-SET,rulesets/WiFiCalling-US.list,WiFiCalling-US 🇺🇸
RULE-SET,rulesets/WiFiCalling-CA.list,WiFiCalling-CA 🇨🇦
RULE-SET,rulesets/WiFiCalling-MX.list,WiFiCalling-MX 🇲🇽
RULE-SET,rulesets/WiFiCalling-BR.list,WiFiCalling-BR 🇧🇷
RULE-SET,rulesets/WiFiCalling-JP.list,WiFiCalling-JP 🇯🇵
RULE-SET,rulesets/WiFiCalling-KR.list,WiFiCalling-KR 🇰🇷
RULE-SET,rulesets/WiFiCalling-HK.list,WiFiCalling-HK 🇭🇰
RULE-SET,rulesets/WiFiCalling-TW.list,WiFiCalling-TW 🇹🇼
RULE-SET,rulesets/WiFiCalling-SG.list,WiFiCalling-SG 🇸🇬
RULE-SET,rulesets/WiFiCalling-IN.list,WiFiCalling-IN 🇮🇳
RULE-SET,rulesets/WiFiCalling-AU.list,WiFiCalling-AU 🇦🇺
RULE-SET,rulesets/WiFiCalling-NZ.list,WiFiCalling-NZ 🇳🇿
RULE-SET,rulesets/WiFiCalling-UA.list,WiFiCalling-UA 🇺🇦
RULE-SET,rulesets/WiFiCalling-GB.list,WiFiCalling-GB 🇬🇧
RULE-SET,rulesets/WiFiCalling-DE.list,WiFiCalling-DE 🇩🇪
