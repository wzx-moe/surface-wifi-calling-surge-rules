# Standalone Surge 5 full config for Wi-Fi Calling
# If you merge this into an existing config, copy the [Proxy Group] and [Rule] blocks only and keep them above broad rules.

[General]
loglevel = notify
include-all-networks = true
include-cellular-services = true

[Proxy Group]
WiFi-Global 🌐 = select, include-all-proxies=true
WiFi-US 🇺🇸 = select, include-all-proxies=true
WiFi-CA 🇨🇦 = select, include-all-proxies=true
WiFi-MX 🇲🇽 = select, include-all-proxies=true
WiFi-BR 🇧🇷 = select, include-all-proxies=true
WiFi-JP 🇯🇵 = select, include-all-proxies=true
WiFi-KR 🇰🇷 = select, include-all-proxies=true
WiFi-HK 🇭🇰 = select, include-all-proxies=true
WiFi-TW 🇹🇼 = select, include-all-proxies=true
WiFi-SG 🇸🇬 = select, include-all-proxies=true
WiFi-IN 🇮🇳 = select, include-all-proxies=true
WiFi-AU 🇦🇺 = select, include-all-proxies=true
WiFi-NZ 🇳🇿 = select, include-all-proxies=true
WiFi-UA 🇺🇦 = select, include-all-proxies=true
WiFi-GB 🇬🇧 = select, include-all-proxies=true
WiFi-DE 🇩🇪 = select, include-all-proxies=true
WiFi-FR 🇫🇷 = select, include-all-proxies=true
WiFi-IT 🇮🇹 = select, include-all-proxies=true
WiFi-ES 🇪🇸 = select, include-all-proxies=true
WiFi-NL 🇳🇱 = select, include-all-proxies=true

[Rule]
RULE-SET,SYSTEM,DIRECT
RULE-SET,LAN,DIRECT

RULE-SET,rulesets/WiFiCalling-US.list,WiFi-US 🇺🇸
RULE-SET,rulesets/WiFiCalling-CA.list,WiFi-CA 🇨🇦
RULE-SET,rulesets/WiFiCalling-MX.list,WiFi-MX 🇲🇽
RULE-SET,rulesets/WiFiCalling-BR.list,WiFi-BR 🇧🇷
RULE-SET,rulesets/WiFiCalling-JP.list,WiFi-JP 🇯🇵
RULE-SET,rulesets/WiFiCalling-KR.list,WiFi-KR 🇰🇷
RULE-SET,rulesets/WiFiCalling-HK.list,WiFi-HK 🇭🇰
RULE-SET,rulesets/WiFiCalling-TW.list,WiFi-TW 🇹🇼
RULE-SET,rulesets/WiFiCalling-SG.list,WiFi-SG 🇸🇬
RULE-SET,rulesets/WiFiCalling-IN.list,WiFi-IN 🇮🇳
RULE-SET,rulesets/WiFiCalling-AU.list,WiFi-AU 🇦🇺
RULE-SET,rulesets/WiFiCalling-NZ.list,WiFi-NZ 🇳🇿
RULE-SET,rulesets/WiFiCalling-UA.list,WiFi-UA 🇺🇦
RULE-SET,rulesets/WiFiCalling-GB.list,WiFi-GB 🇬🇧
RULE-SET,rulesets/WiFiCalling-DE.list,WiFi-DE 🇩🇪
RULE-SET,rulesets/WiFiCalling-FR.list,WiFi-FR 🇫🇷
