# Standalone Surge 5 full config for Wi-Fi Calling
# If you merge this into an existing config, copy the [Proxy Group] and [Rule] blocks only and keep them above broad rules.

[General]
loglevel = notify
include-all-networks = true
include-cellular-services = true

[Proxy Group]
VoWiFi-Global 🌐 = select, include-all-proxies=true
VoWiFi-US 🇺🇸 = select, include-all-proxies=true
VoWiFi-CA 🇨🇦 = select, include-all-proxies=true
VoWiFi-MX 🇲🇽 = select, include-all-proxies=true
VoWiFi-BR 🇧🇷 = select, include-all-proxies=true
VoWiFi-JP 🇯🇵 = select, include-all-proxies=true
VoWiFi-KR 🇰🇷 = select, include-all-proxies=true
VoWiFi-HK 🇭🇰 = select, include-all-proxies=true
VoWiFi-TW 🇹🇼 = select, include-all-proxies=true
VoWiFi-SG 🇸🇬 = select, include-all-proxies=true
VoWiFi-IN 🇮🇳 = select, include-all-proxies=true
VoWiFi-AU 🇦🇺 = select, include-all-proxies=true
VoWiFi-NZ 🇳🇿 = select, include-all-proxies=true
VoWiFi-UA 🇺🇦 = select, include-all-proxies=true
VoWiFi-GB 🇬🇧 = select, include-all-proxies=true
VoWiFi-DE 🇩🇪 = select, include-all-proxies=true
VoWiFi-FR 🇫🇷 = select, include-all-proxies=true
VoWiFi-IT 🇮🇹 = select, include-all-proxies=true
VoWiFi-ES 🇪🇸 = select, include-all-proxies=true
VoWiFi-NL 🇳🇱 = select, include-all-proxies=true

[Rule]
RULE-SET,SYSTEM,DIRECT
RULE-SET,LAN,DIRECT

RULE-SET,rulesets/WiFiCalling-US.list,VoWiFi-US 🇺🇸
RULE-SET,rulesets/WiFiCalling-CA.list,VoWiFi-CA 🇨🇦
RULE-SET,rulesets/WiFiCalling-MX.list,VoWiFi-MX 🇲🇽
RULE-SET,rulesets/WiFiCalling-BR.list,VoWiFi-BR 🇧🇷
RULE-SET,rulesets/WiFiCalling-JP.list,VoWiFi-JP 🇯🇵
RULE-SET,rulesets/WiFiCalling-KR.list,VoWiFi-KR 🇰🇷
RULE-SET,rulesets/WiFiCalling-HK.list,VoWiFi-HK 🇭🇰
RULE-SET,rulesets/WiFiCalling-TW.list,VoWiFi-TW 🇹🇼
RULE-SET,rulesets/WiFiCalling-SG.list,VoWiFi-SG 🇸🇬
RULE-SET,rulesets/WiFiCalling-IN.list,VoWiFi-IN 🇮🇳
RULE-SET,rulesets/WiFiCalling-AU.list,VoWiFi-AU 🇦🇺
RULE-SET,rulesets/WiFiCalling-NZ.list,VoWiFi-NZ 🇳🇿
RULE-SET,rulesets/WiFiCalling-UA.list,VoWiFi-UA 🇺🇦
RULE-SET,rulesets/WiFiCalling-GB.list,VoWiFi-GB 🇬🇧
RULE-SET,rulesets/WiFiCalling-DE.list,VoWiFi-DE 🇩🇪
RULE-SET,rulesets/WiFiCalling-FR.list,VoWiFi-FR 🇫🇷
