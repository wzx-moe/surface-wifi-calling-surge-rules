[General]
loglevel = notify

[Proxy Group]
WiFiCalling-Global = select, include-all-proxies=true

WiFiCalling-US = select, include-all-proxies=true, include-other-group=WiFiCalling-Global, policy-regex-filter="(?i)(US|USA|United States|美国)"
